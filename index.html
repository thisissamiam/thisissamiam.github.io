<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sam I Am</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #startBtn {
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
    }

    #scare {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
    }

    #scare img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #text {
      font-size: 24px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div id="text">This is Sam I Am</div>
  <button id="startBtn">Start</button>

  <div id="scare">
    <!-- Replace with your jumpscare image -->
    <img src="jumpscare.jpg" alt="jumpscare">
  </div>

  <!-- Sound file -->
  <audio id="scareSound" src="videoplayback.mp3" preload="auto"></audio>

  <script>
    const startBtn = document.getElementById("startBtn");
    const scare = document.getElementById("scare");
    const audio = document.getElementById("scareSound");

    startBtn.addEventListener("click", async () => {
      startBtn.style.display = "none";

      // Unlock audio (required by browsers)
      try {
        audio.volume = 1;
        await audio.play();
        audio.pause();
      } catch (e) {}

      // Random delay between 0.5s and 3s
      const delay = Math.random() * 2500 + 500;

      setTimeout(() => {
        // Play sound
        audio.currentTime = 0;
        audio.play().catch(() => {});

        // Show jumpscare
        scare.style.display = "flex";
      }, delay);
    });
  </script>

</body>
</html>
