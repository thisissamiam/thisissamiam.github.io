<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sam I Am</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f2027;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      flex-direction: column;
    }

    .message {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    button {
      padding: 15px 25px;
      font-size: 1.2rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #00f2ff;
      color: black;
    }

    /* Jumpscare */
    .jumpscare {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: red;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .guy {
      font-size: 5rem;
      margin-top: 20px;
      animation: slideIn 0.4s forwards;
      position: relative;
      left: -200%;
    }

    @keyframes slideIn {
      to {
        left: 0;
      }
    }
  </style>
</head>
<body>

  <div class="message">this is sam i am</div>

  <button id="startBtn">Start</button>

  <div class="jumpscare" id="scare">
    <div>I do not like them, Sam-I-Am!</div>
    <div class="guy">😡</div>
  </div>

  <audio id="scareSound" src="videoplayback.mp3" preload="auto"></audio>

  <script>
    const startBtn = document.getElementById("startBtn");
    const scare = document.getElementById("scare");
    const audio = document.getElementById("scareSound");

    startBtn.addEventListener("click", () => {
      // Hide button after click
      startBtn.style.display = "none";

      // Random delay (0.5–3 sec)
      const delay = Math.random() * 2500 + 500;

      setTimeout(() => {
        scare.style.display = "flex";

        audio.currentTime = 0;
        audio.play().catch(err => {
          console.log("Audio blocked:", err);
        });

      }, delay);
    });
  </script>

</body>
</html>
