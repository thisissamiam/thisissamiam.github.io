<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sam I Am</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f2027;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .message {
      font-size: 3rem;
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Jumpscare screen */
    .jumpscare {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: red;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
    }

    .scare-content {
      text-align: center;
      font-size: 2.5rem;
      color: black;
    }

    .guy {
      font-size: 5rem;
      position: relative;
      left: -200%;
      animation: slideIn 0.4s forwards;
      margin-top: 20px;
    }

    @keyframes slideIn {
      to {
        left: 0;
      }
    }
  </style>
</head>
<body>

  <div class="message">
    this is sam i am
  </div>

  <div class="jumpscare" id="scare">
    <div class="scare-content">
      <div>I do not like them, Sam-I-Am!</div>
      <div class="guy">😡</div>
    </div>
  </div>

  <!-- Sound file (must be in same folder) -->
  <audio id="scareSound" src="videoplayback" preload="auto"></audio>

  <script>
    // Random delay between 0.5s and 3s
    const delay = Math.random() * 2500 + 500;

    setTimeout(() => {
      const scare = document.getElementById("scare");
      const audio = document.getElementById("scareSound");

      scare.style.display = "flex";

      // Play sound
      audio.play().catch(err => {
        console.log("Autoplay blocked:", err);
      });

    }, delay);
  </script>

</body>
</html>
