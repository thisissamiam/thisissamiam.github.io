<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sam I Am</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f2027;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .message {
      font-size: 3rem;
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Jumpscare screen */
    .jumpscare {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: red;
      color: black;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      text-align: center;
      flex-direction: column;
    }

    .jumpscare img {
      max-width: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="message">
    this is sam i am
  </div>

  <div class="jumpscare" id="scare">
    <div>
      I do not like them, Sam-I-Am!
    </div>
  </div>

  <script>
    // Random delay between 5 and 15 seconds
    const delay = Math.random() * 10000 + 5000;

    setTimeout(() => {
      document.getElementById("scare").style.display = "flex";

      // Optional: play a sound if you add one
      // const audio = new Audio("sound.mp3");
      // audio.play();

    }, delay);
  </script>

</body>
</html>
